<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Aula 1 - Introdução ao JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f4f4f4;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .resultado {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Introdução ao JavaScript</h1>
    <p>Abra o console do navegador (F12) para ver os logs.</p>

    <button onclick="executarScript()">Executar Script</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    function executarScript() {

      // =============================
      // VARIÁVEIS
      // =============================

      let nome = "Vanderli";
      let idade = 47;
      const curso = "Técnico em Desenvolvimento de Sistemas";

      // =============================
      // TIPOS PRIMITIVOS
      // =============================

      let ativo = true;
      let saldo = 1500.75;
      let valorNulo = null;
      let indefinido;

      console.log("Tipo de nome:", typeof nome);
      console.log("Tipo de idade:", typeof idade);
      console.log("Tipo de ativo:", typeof ativo);
      console.log("Tipo de saldo:", typeof saldo);
      console.log("Tipo de valorNulo:", typeof valorNulo);
      console.log("Tipo de indefinido:", typeof indefinido);

      // =============================
      // OPERAÇÕES MATEMÁTICAS
      // =============================

      let numero1 = 10;
      let numero2 = 5;

      let soma = numero1 + numero2;
      let subtracao = numero1 - numero2;
      let multiplicacao = numero1 * numero2;
      let divisao = numero1 / numero2;

      console.log("Soma:", soma);
      console.log("Subtração:", subtracao);
      console.log("Multiplicação:", multiplicacao);
      console.log("Divisão:", divisao);

      // =============================
      // CONCATENAÇÃO
      // =============================

      let mensagem = "Olá " + nome + 
        ", você tem " + idade + 
        " anos e está matriculado no curso de " + curso + ".";

      console.log(mensagem);

      // =============================
      // EXIBIR NA TELA
      // =============================

      document.getElementById("resultado").innerHTML = `
        ${mensagem} <br><br>
        Resultado da soma: ${soma} <br>
        Resultado da Subtração: ${subtracao} <br>
        Resultado da Multiplicação: ${multiplicacao} <br>
        Resultado da Divisão: ${divisao}
      `;
    }
  </script>

</body>
</html>
